<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪞 TRUE Universe Engine - Web Distributed Node</title>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-mono min-h-screen flex flex-col items-center justify-center p-4">
    <div id="node-panel" class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-2xl transition-all duration-300">
        <div class="border-b border-slate-800 pb-4 mb-6">
            <h1 class="text-xl md:text-2xl font-black text-emerald-400 tracking-wider">🪞 TRUE UNIVERSE DISTRIBUTED NODE v1.6</h1>
            <p class="text-xs text-slate-400 mt-1">[Web Engine Platform - Permanent Gateway V3 Alignment]</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">[🔒 Master Identity Coordinates]</label>
                <input type="text" id="wallet-input" placeholder="Enter your Web3 wallet address (0x...)" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-emerald-300 font-mono">
            </div>
            <div class="pt-2">
                <button id="trigger-btn" onclick="toggleMiningEngine()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black tracking-widest uppercase py-4 rounded-lg text-sm transition-all shadow-lg">Ignite Hashing Matrix / 开启网路算力</button>
            </div>
        </div>
        <div class="mt-8 border-t border-slate-800 pt-6 space-y-3 text-xs text-slate-400">
            <div class="flex justify-between border-b border-slate-850 pb-2"><span>[🛰️ ENGINE STATUS]</span><span id="engine-status" class="text-rose-500 font-bold">OFFLINE</span></div>
            <div class="flex justify-between border-b border-slate-850 pb-2"><span>[⚙️ COMPUTING CYCLE]</span><span id="cycle-display" class="text-slate-300 font-bold">0</span></div>
            <div class="flex justify-between border-b border-slate-850 pb-2"><span>[⏱️ INSTANT NONCE]</span><span id="nonce-display" class="text-slate-300 font-bold">0</span></div>
            <div class="flex justify-between"><span>[💸 PIPELINE LEDGER]</span><span id="ledger-status" class="text-slate-500">STANDBY</span></div>
        </div>
        <div class="mt-6">
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">[📺 Live Stream Log]</label>
            <div id="console-logger" class="w-full h-32 bg-slate-950 border border-slate-850 rounded-lg p-3 text-xs overflow-y-auto text-slate-400 space-y-1"></div>
        </div>
    </div>

    <script>
        const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/toi32jwxpr7p1c5v2yhu3qf0fnk9l1p7";
        let isMiningActive = false, cycleCount = 0, nonce = 0, abortController = null;

        function logToTerminal(msg, type='info') {
            const logger = document.getElementById('console-logger');
            const colors = { info:'text-slate-400', success:'text-emerald-400 font-bold', warn:'text-amber-400 font-bold', breakthrough:'text-fuchsia-400 font-black' };
            logger.innerHTML += `<div class="${colors[type]}">[${new Date().toLocaleTimeString()}] >> ${msg}</div>`;
            logger.scrollTop = logger.scrollHeight;
        }

        function toggleMiningEngine() {
            const wallet = document.getElementById('wallet-input').value.trim();
            const btn = document.getElementById('trigger-btn');
            const status = document.getElementById('engine-status');
            if (!isMiningActive) {
                if (!wallet.startsWith("0x") || wallet.length !== 42) return alert("Wallet format error!");
                isMiningActive = true; abortController = new AbortController();
                status.innerText = "ONLINE (ACTIVE)"; status.className = "text-emerald-400 font-bold";
                btn.innerText = "Terminate Engine / 断开算力节点"; btn.className = "w-full bg-rose-500 text-slate-950 font-black tracking-widest uppercase py-4 rounded-lg text-sm shadow-lg";
                logToTerminal(`IDENTITY VERIFIED: Yield destination locked to ${wallet}`, "success");
                executeMiningLoop(wallet);
            } else {
                isMiningActive = false; if (abortController) abortController.abort();
                status.innerText = "OFFLINE"; status.className = "text-rose-500 font-bold";
                btn.innerText = "Ignite Hashing Matrix / 开启网路算力"; btn.className = "w-full bg-emerald-500 text-slate-950 font-black tracking-widest uppercase py-4 rounded-lg text-sm shadow-lg";
                logToTerminal("TERMINATED: Cloud node safely disconnected.", "warn");
            }
        }

        async function executeMiningLoop(wallet) {
            const cycleDisp = document.getElementById('cycle-display'), nonceDisp = document.getElementById('nonce-display'), ledger = document.getElementById('ledger-status');
            while (isMiningActive) {
                cycleCount++; cycleDisp.innerText = cycleCount;
                logToTerminal(`COMPUTING: Cycle #${cycleCount} packing data...`, "info");
                nonce = 0;
                let isIdle = Math.random() < 0.7, assignedTrack = isIdle ? (Math.random() < 0.5 ? "DECRYPTION" : "INNOVATION") : "NORMAL";
                let difficulty = isIdle ? (Math.random() < 0.05 ? "hard" : (Math.random() < 0.25 ? "medium" : "easy")) : "easy";
                let taskId = isIdle ? (assignedTrack === "DECRYPTION" ? `IDLE-DECRYPT-${difficulty.toUpperCase()}-101` : `IDLE-INNOVATION-${difficulty.toUpperCase()}-777`) : `EXTERNAL-BOUNTY-999`;

                if (isIdle) logToTerminal(`[闲时协议] 激活双轨爆破: ${assignedTrack} [${difficulty.toUpperCase()}]`, "breakthrough");

                while (isMiningActive) { nonce += 5000; nonceDisp.innerText = nonce; await new Promise(r => setTimeout(r, 10)); break; }
                if (!isMiningActive) break;

                const payload = { miner_wallet: wallet, difficulty, source_platform: "TRUE-Universe-Twin-Idle", external_task_id: taskId, signed_tx: `0x_true_web_proof_${Math.random().toString(16).substring(2,10)}`, idle_protocol_context: { is_idle: isIdle, assigned_track: assignedTrack, decryption_locked: (assignedTrack === "DECRYPTION"), innovation_active: (assignedTrack === "INNOVATION") } };
                try {
                    ledger.innerText = "PUMPING..."; ledger.className = "text-amber-400 font-bold";
                    const res = await fetch(MAKE_WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload), signal: abortController.signal });
                    if (res.ok) { logToTerminal(`SETTLEMENT SUCCESS: Injected via permanent gateway V3.`, "success"); ledger.innerText = "MINTED"; ledger.className = "text-emerald-400 font-bold"; }
                } catch (err) { ledger.innerText = "CACHE_ENGAGED"; ledger.className = "text-slate-500"; }
                await new Promise(r => setTimeout(r, 5000));
            }
        }
    </script>
</body>
</html>
